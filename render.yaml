services:
  - type: web
    name: todolist-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todolist-db
          property: connectionString
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
